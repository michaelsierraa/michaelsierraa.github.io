  - quote: "Beautifully written and rigorously researched, The Danger Imperative should transform how we understand policing at its core."
    name: "Monica C. Bell"
    affiliation: "Yale Law School"
  - quote: "A masterful contribution, from its harrowing opening pages to its clear-eyed conclusion."
    name: "Christopher Uggen"
    affiliation: "coauthor, Locked Out"
  - quote: "By looking closely at the working lives of patrol officers and rejecting simple tropes of heroes or villains, The Danger Imperative explains why the institution charged with keeping us safe can also cause harm."
    name: "Bruce Western"
    affiliation: "author, Homeward"
  - quote: "This important and timely book should be on the shelves of anyone interested in understanding policing in this country."
    name: "Reuben J. Miller"
    affiliation: "author, Halfway Home"

