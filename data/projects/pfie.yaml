description: |
  The Police Firearm Injury Explorer is a free, open-source web application to explore and access data on U.S. police officers shot in the line of duty. These data are originally drawn from the Gun Violence Archive (GVA), a non-partisan, non-profit organization that compiles information on incidents of gun violence from over 7,500 law enforcement, media, government, and commercial sources daily in an effort to provide near-real-time data about the results of gun violence.

