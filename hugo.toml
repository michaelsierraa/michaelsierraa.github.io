baseURL = "https://www.sierraarevalo.com/"
title = "Michael Sierra-Arévalo"
languageCode = "en"

[pagination]
pagerSize = 5

[outputs]
  page    = ["HTML"]
  home    = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term    = ["HTML", "RSS"]
  footer  = []

[taxonomies]
  tag      = "tags"
  category = "categories"

disableKinds = ["footerSection"]

[module]
[[module.imports]]
path = "github.com/zetxek/adritian-free-hugo-theme"

[[module.mounts]]
source = "archetypes"
target = "archetypes"
[[module.mounts]]
source = "assets"
target = "assets"
[[module.mounts]]
source = "i18n"
target = "i18n"
[[module.mounts]]
source = "layouts"
target = "layouts"
[[module.mounts]]
source = "static"
target = "static"
[[module.mounts]]
source = "node_modules/bootstrap/scss"
target = "assets/scss/bootstrap"
[[module.mounts]]
source = "node_modules/bootstrap/dist/js"
target = "assets/js/bootstrap"
[[module.mounts]]
source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
target = "assets/js/vendor/bootstrap.bundle.min.js"
[[module.mounts]]
source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
target = "assets/css/bootstrap-print.css"

[params]
title       = "Michael Sierra-Arévalo"
description = "Associate Professor of Sociology at UT Austin. Scholar of policing, violence, and law. Author of The Danger Imperative."
images      = ["/img/og-img.png"]
themeColor  = "#595f39"

[params.seo]
siteName        = "Michael Sierra-Arévalo"
siteDescription = "Associate Professor of Sociology at UT Austin. Scholar of policing, violence, and law. Author of The Danger Imperative."
siteImage       = "/img/og-img.png"

[params.seo.person]
name   = "Michael Sierra-Arévalo"
url    = "https://www.sierraarevalo.com"
sameAs = [
  "https://twitter.com/michaelsierraa",
  "https://www.instagram.com/michaelsierraa",
  "https://scholar.google.com/citations?user=fOxqGsEAAAAJ",
]
sections = ["showcase", "about", "contact"]

[params.social]
twitter = "michaelsierraa"

[params.analytics]
vercelPageInsights = false
vercelAnalytics    = false
[params.analytics.googleAnalytics]
code    = ""
enabled = false
[params.analytics.googleTagManager]
code    = ""
enabled = false

# Cloudflare Web Analytics — paste beacon token here when ready
# [params.analytics.cloudflare]
# token   = ""
# enabled = false

[params.favicons]
source = "icons/favicon.png"

[params.colorTheme.selector.disable]
footer      = false
header      = false
mobileHeader = false

[params.languages.selector.disable]
footer      = true
header      = true
mobileHeader = true

[params.plugins]
[[params.plugins.css]]
URL = "css/custom.css"
[[params.plugins.css]]
URL = "css/adritian-icons.css"
[[params.plugins.css]]
URL = "css/bootstrap-print.css"

[[params.plugins.js]]
URL = "js/rad-animations.js"
[[params.plugins.js]]
URL = "js/sticky-header.js"
[[params.plugins.js]]
URL = "js/library/fontfaceobserver.js"

[[params.plugins.scss]]
URL = "scss/adritian.scss"

[build]
writeStats = true
[build.buildStats]
enabledFor    = ["scss"]
disableClasses = false
disableIDs    = false
disableTags   = false
enable        = true

[markup]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
lineNos   = false
noClasses = false
style     = "github"

[imaging]
resampleFilter = "Lanczos"
quality        = 85
anchor         = "Smart"

[minify]
disableCSS  = false
disableHTML = false
disableJS   = false
disableJSON = false
disableSVG  = false
disableXML  = false
minifyOutput = true
[minify.tdewolff.html]
keepDefaultAttrVals = true
keepWhitespace      = false
[minify.tdewolff.css]
precision = 0
[minify.tdewolff.js]
precision = 0

enableRobotsTXT = true

[languages]
[languages.en]
disabled      = false
languageCode  = "en"
languageName  = "English"
weight        = 0

[[languages.en.menus.header]]
name   = "About"
URL    = "#about"
weight = 1
[[languages.en.menus.header]]
name   = "Book"
URL    = "/book"
weight = 2
[[languages.en.menus.header]]
name   = "Research"
URL    = "/research"
weight = 3
[[languages.en.menus.header]]
name   = "Writing"
URL    = "/writing"
weight = 4
[[languages.en.menus.header]]
name   = "Media"
URL    = "/media"
weight = 5
[[languages.en.menus.header]]
pre    = "email"
name   = "Contact"
URL    = "#contact"
weight = 6

[[languages.en.menus.footer]]
name   = "About"
URL    = "#about"
weight = 1
[[languages.en.menus.footer]]
name   = "Book"
URL    = "/book"
weight = 2
[[languages.en.menus.footer]]
name   = "Research"
URL    = "/research"
weight = 3
[[languages.en.menus.footer]]
name   = "Writing"
URL    = "/writing"
weight = 4
[[languages.en.menus.footer]]
name   = "Media"
URL    = "/media"
weight = 5
[[languages.en.menus.footer]]
name   = "Contact"
URL    = "#contact"
weight = 6
